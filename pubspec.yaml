name: notesapp
description: "Offline-first Flutter Notes App with Sync Queue"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 State Management
  provider: ^6.0.5

  # 🔥 Local Database (Offline Storage)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 🔥 Unique ID (Idempotency)
  uuid: ^4.4.0

  # 🔥 Network Check
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true